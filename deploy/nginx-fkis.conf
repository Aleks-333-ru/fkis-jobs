server {
    listen 80;
    listen [::]:80;
    server_name ВАШ_ДОМЕН www.ВАШ_ДОМЕН;

    # Проксируем на Node.js-приложение
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Кеш для статики (логотипы, иконки)
    location ~* \.(png|svg|ico|webp|jpg|jpeg)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public";
    }
}

# После запуска certbot автоматически добавит блок server { listen 443 ssl; ... }
# и перенаправление с http на https. Вручную ничего дописывать не нужно.
